apiVersion: apps/v1
kind: Deployment
metadata:
  name: myapp
spec:
  replicas: 1
  template:
    spec:
      containers:
        - name: myapp
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: cloud
            - name: APP_ENV
              value: dev
            - name: AWS_REGION
              value: us-east-1

