version: "3.9"

services:
  mysql:
    image: mysql:8.4
    container_name: myapp-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: myapp
      MYSQL_USER: myapp
      MYSQL_PASSWORD: myapp
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 10

  localstack:
    image: localstack/localstack:3.7
    container_name: myapp-localstack
    environment:
      SERVICES: sqs,s3,sns,secretsmanager
      AWS_DEFAULT_REGION: us-east-1
      DEBUG: 1
    ports:
      - "4566:4566"
    volumes:
      - ./scripts/init-localstack.sh:/etc/localstack/init/ready.d/init-localstack.sh

